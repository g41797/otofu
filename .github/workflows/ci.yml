name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        opt: [ none, minimal, size, speed, aggressive ]
        pkg:
          - pipeline

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: dev-2026-03

      - name: Build ${{ matrix.pkg }}
        shell: bash
        run: |
          if [ "${{ matrix.opt }}" = "none" ]; then
            odin build ./${{ matrix.pkg }}/ -build-mode:lib -vet -strict-style -o:none -debug -collection:matryoshka=deps/matryoshka
          else
            odin build ./${{ matrix.pkg }}/ -build-mode:lib -vet -strict-style -o:${{ matrix.opt }} -collection:matryoshka=deps/matryoshka
          fi

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        opt: [ none, minimal, size, speed, aggressive ]
        pkg:
          - tests/unit/pipeline

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: dev-2026-03

      - name: Test ${{ matrix.pkg }}
        shell: bash
        run: |
          # For HTTP server tests, running multiple tests in parallel leads to port
          # conflicts and event-loop races (especially on Windows IOCP).
          # We force serial execution to ensure reliability via -define:ODIN_TEST_THREADS=1.

          if [ "${{ matrix.opt }}" = "none" ]; then
            odin test ./${{ matrix.pkg }}/ -vet -strict-style -disallow-do -o:none -debug -define:ODIN_TEST_FANCY=false -define:ODIN_TEST_THREADS=1 -collection:matryoshka=deps/matryoshka
          else
            odin test ./${{ matrix.pkg }}/ -vet -strict-style -disallow-do -o:${{ matrix.opt }} -define:ODIN_TEST_FANCY=false -define:ODIN_TEST_THREADS=1 -collection:matryoshka=deps/matryoshka
          fi
